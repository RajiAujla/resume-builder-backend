name: Resume Builder CD

on:
  push:
    branches: [master]

jobs:
  docker-and-Ec2:
    runs-on: ubuntu-latest

    steps:
      - name: Pull Docker image
        run: sudo docker pull rajwinderkaur061/resume-ai:latest

      - name: delete old docker container
        run: sudo docker rm -f resume-ai-container || true

      - name: Run docker container
        run: sudo docker run -d -p 8080:8080 --name resume-ai-container rajwinderkaur061/resume-ai
